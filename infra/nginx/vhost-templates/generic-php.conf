# ControlPanel template adapted from common CloudPanel vhost patterns.
server {
    listen 80;
    listen [::]:80;
    server_name {{ server_names }};
    root {{ document_root }};
    index index.php index.html;

    access_log /var/log/nginx/controlpanel-{{ site_id }}-access.log;
    error_log /var/log/nginx/controlpanel-{{ site_id }}-error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/lib/controlpanel/acme/{{ site_id }};
        auth_basic off;
        allow all;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_intercept_errors on;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_read_timeout 3600;
        fastcgi_send_timeout 3600;
        try_files $uri =404;
        fastcgi_pass {{ upstream_name }};
    }

    location ~* \.(css|js|jpg|jpeg|gif|png|ico|gz|svg|svgz|ttf|otf|woff|woff2|eot|mp4|ogg|ogv|webm|webp|zip|swf|map|mjs)$ {
        add_header Access-Control-Allow-Origin "*";
        expires max;
        access_log off;
        try_files $uri =404;
    }
}
