# ControlPanel Python template adapted from common CloudPanel vhost patterns.
server {
    listen 80;
    listen [::]:80;
    server_name {{ server_names }};
    root {{ document_root }};
    index index.html;

    access_log /var/log/nginx/controlpanel-{{ site_id }}-access.log;
    error_log /var/log/nginx/controlpanel-{{ site_id }}-error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/lib/controlpanel/acme/{{ site_id }};
        auth_basic off;
        allow all;
    }

    location /static/ {
        try_files $uri @python_upstream;
        expires max;
        access_log off;
    }

    location / {
        proxy_pass http://{{ upstream_name }};
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 900;
        proxy_send_timeout 900;
        proxy_read_timeout 900;
    }

    location @python_upstream {
        proxy_pass http://{{ upstream_name }};
    }
}
